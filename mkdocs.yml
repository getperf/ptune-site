site_name: ptune
site_url: https://ptune.getperf.net

theme:
  name: material
  language: ja
  logo: img/ptune_icon.png
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え
  features:
    - navigation.footer
extra_css:
  - stylesheets/extra.css

nav:
  - 日本語:
      - ホーム: index.md
      - ユーザテストへのご協力: user-test/index.md
      - スマホアプリ ptune: ptune.md
      - Obsidian プラグイン ptune-task:
        - システム要件: ptune-task/requirements/index.md
        - セットアップ:
            - セットアップ概要: ptune-task/setup/index.md
            - Obsidian インストール: ptune-task/setup/install-obsidian.md
            - ptune-task プラグインインストール: ptune-task/setup/install-plugin.md
            - WebClipper の確認: ptune-task/setup/install-web-clipper.md
            - PtuneSync 補助ツール: ptune-task/setup/install-ptunesync.md
            - AIサービスキー設定: ptune-task/setup/ai-service-keys.md
            - その他のセットアップ: ptune-task/setup/other-setup.md
        - コマンドリファレンス:
            - コマンド一覧: ptune-task/reference/commands.md
            - 設定パラメータ: ptune-task/reference/settings.md
        - よくある質問: ptune-task/faq/index.md
      - プライバシーポリシー: privacy.md
      - 利用規約: terms.md
  - English:
      - Home: en/index.md
      - Smartphone Apps ptune: en/ptune.md
      - Obsidian plugin ptune-log: en/ptune-log.md
      - Privacy Policy: en/privacy.md
      - Terms of Service: en/terms.md
